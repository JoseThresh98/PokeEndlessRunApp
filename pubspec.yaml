name: poke_run_endless_app
description: "Endless runner with type-based creature abilities"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0

  # Local Storage (scores, unlocks, currency)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.7

  # Utilities
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/backgrounds/
    - assets/images/ground/
    - assets/images/obstacles/
    - assets/images/creatures/